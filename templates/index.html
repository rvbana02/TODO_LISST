{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h3 class="mb-3">My Tasks</h3>

<form action="/add" method="POST" class="row g-2 mb-4">
    <div class="col-md-4">
        <input type="text" name="content" class="form-control" placeholder="Task..." required>
    </div>

    <div class="col-md-3">
        <input type="date" name="due_date" class="form-control" required>
    </div>

    <div class="col-md-3">
        <select name="priority" class="form-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary w-100">Add</button>
    </div>
</form>

<ul class="list-group">
{% for task in tasks %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
            <strong class="{{ 'text-decoration-line-through text-muted' if task['completed'] }}">
                {{ task['content'] }}
            </strong>
            <br>
            <small>Due: {{ task['due_date'] }} | Priority: {{ task['priority'] }}</small>
        </div>

        <div>
            <a href="/toggle/{{ task['id'] }}" class="btn btn-sm btn-success">✔</a>
            <a href="/delete/{{ task['id'] }}" class="btn btn-sm btn-danger">❌</a>
        </div>
    </li>
{% endfor %}
</ul>

{% endblock %}
